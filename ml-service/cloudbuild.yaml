# cloudbuild.yaml
# CI/CD pipeline untuk ml-service di Google Cloud Run
#
# cara setup di Cloud Console:
#   Cloud Run -> pilih service -> Edit Continuous Deployment
#   -> connect ke GitHub repo -> pilih file ini sebagai build config
#
# model ONNX di-download dari GCS langsung saat docker build
# (tidak perlu step terpisah, sudah ada di dalam Dockerfile)
#
# PENTING: sebelum pertama kali deploy, upload model dulu ke GCS:
#   gsutil cp path/to/ml-models/*.onnx gs://capture-security/ml-models/

substitutions:
  _REGION: asia-southeast1
  _SERVICE_NAME: ml-service
  _REPO: smart-door
  _GCS_BUCKET: ml-models-iot

steps:
  # ─────────────────────────────────────────────────────────────────────
  # build docker image
  # model ONNX otomatis di-download dari GCS di dalam Dockerfile
  # Cloud Build service account punya akses GCS di project yang sama
  # ─────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-f'
      - 'ml-service/Dockerfile'
      - '--build-arg'
      - 'GCS_BUCKET=${_GCS_BUCKET}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # ─────────────────────────────────────────────────────────────────────
  # push ke Artifact Registry
  # ─────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}'
    waitFor: ['build']

  # ─────────────────────────────────────────────────────────────────────
  # deploy ke Cloud Run
  # ─────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=60'
      - '--concurrency=10'
    waitFor: ['push']

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

