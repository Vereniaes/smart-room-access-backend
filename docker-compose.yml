# docker-compose.yml
# jalankan Node.js backend + Python ML service sekaligus
#
# usage:
#   docker compose up --build
#
# catatan:
#   - model ONNX harus sudah ada di ../ml-models/ (download via download_models.sh)
#   - copy .env.example ke .env dan isi DATABASE_URL, HMAC_SECRET, dll

services:

  # ─────────────────────────────────────────────
  # Node.js backend (Express)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      ML_SERVICE_URL: http://ml-service:8001
    env_file:
      - .env.production.local
    depends_on:
      ml-service:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Python ML service (FastAPI)
  # ─────────────────────────────────────────────
  ml-service:
    build:
      context: ..                          # root repo (akses ml-models/)
      dockerfile: smart-room-access-backend/ml-service/Dockerfile
      args:
        GCS_BUCKET: ml-models-iot
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      MODEL_DIR: /app/models
    env_file:
      - ml-service/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s    # model loading butuh waktu
      retries: 3
